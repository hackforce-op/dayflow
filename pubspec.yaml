# DayFlow - 跨平台个人日常管理应用
# 项目配置文件
name: dayflow
description: "DayFlow - 跨平台个人日常管理应用"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  # 国际化支持
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # 路由管理
  go_router: ^14.0.0

  # 本地数据库
  drift: ^2.20.0
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # 远程数据同步
  supabase_flutter: ^2.5.0

  # 富文本编辑器
  flutter_quill: ^11.5.0

  # 工具库
  intl: ^0.20.2
  uuid: ^4.4.0
  shared_preferences: ^2.2.0
  file_picker: ^8.0.2
  http: ^1.2.0

  # 地理位置：获取用户当前位置信息（需 Android/iOS 权限配置）
  geolocator: ^13.0.0

  # 中国农历日历转换库
  lunar: ^1.0.0
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  drift_dev: ^2.20.0

  # 代码规范与静态分析
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.0

dependency_overrides:
  quill_native_bridge_windows:
    path: third_party/quill_native_bridge_windows

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: NotoSansCJKsc
      fonts:
        - asset: assets/fonts/NotoSansCJKsc-Regular.otf
          weight: 400
        - asset: assets/fonts/NotoSansCJKsc-Bold.otf
          weight: 700
